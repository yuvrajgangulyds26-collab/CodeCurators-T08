<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Wildfire Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0a0a0f, #1a1a2e, #16213e);
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
      color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .glass-card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 50px 40px;
      width: 380px;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
      text-align: center;
    }
    h2 { font-weight: 600; margin-bottom: 8px; color: #fff; }
    .subtitle { color: #aaa; font-size: 0.85rem; margin-bottom: 28px; }
    .form-control {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      border-radius: 12px;
      padding: 12px 15px;
      margin-bottom: 14px;
      width: 100%;
    }
    .form-control:focus {
      background: rgba(255,255,255,0.25);
      box-shadow: 0 0 10px rgba(0,188,212,0.4);
      outline: none;
      color: #fff;
    }
    .form-control::placeholder { color: #aaa; }
    .btn-glow {
      width: 100%;
      background: linear-gradient(90deg, #00bcd4, #007bff);
      border: none;
      color: #fff;
      font-weight: 600;
      border-radius: 25px;
      padding: 12px 0;
      transition: all 0.3s ease;
      margin-top: 4px;
    }
    .btn-glow:hover { box-shadow: 0 0 20px #00bcd4; transform: scale(1.03); }
    .btn-otp {
      width: 100%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-weight: 600;
      border-radius: 25px;
      padding: 11px 0;
      transition: all 0.3s ease;
      margin-bottom: 14px;
    }
    .btn-otp:hover { background: rgba(0,188,212,0.2); border-color: #00bcd4; }
    .btn-otp:disabled { opacity: 0.5; cursor: not-allowed; }
    .small-link {
      display: block;
      margin-top: 15px;
      color: #bbb;
      text-decoration: none;
      transition: color 0.3s;
    }
    .small-link:hover { color: #00bcd4; }
    .msg-box {
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-top: 14px;
      display: none;
    }
    .msg-error   { background: rgba(220,53,69,0.2);  border: 1px solid #dc3545; color: #ff8a8a; }
    .msg-success { background: rgba(25,135,84,0.2);  border: 1px solid #198754; color: #75d9a3; }

    /* Step visibility */
    #stepOtp, #stepPassword { display: none; }
  </style>
</head>
<body>
<div class="glass-card">
  <h2>Reset Password</h2>
  <p class="subtitle">We'll send a code to your email to verify it's you.</p>

  <!-- Step 1: Email -->
  <div id="stepEmail">
    <input id="emailInput" type="email" class="form-control" placeholder="Enter your email" />
    <button class="btn-otp" id="sendOtpBtn" onclick="sendOtp()">Send OTP</button>
  </div>

  <!-- Step 2: OTP -->
  <div id="stepOtp">
    <p style="color:#aaa;font-size:0.82rem;margin-bottom:12px;">
      A 6-digit code was sent to <strong id="emailDisplay"></strong>
    </p>
    <input id="otpInput" type="text" class="form-control" placeholder="Enter OTP" maxlength="6" />
    <button class="btn-otp" id="verifyOtpBtn" onclick="verifyStep()">Verify OTP</button>
  </div>

  <!-- Step 3: New Password -->
  <div id="stepPassword">
    <input id="passwordInput"  type="password" class="form-control" placeholder="New password" />
    <input id="password2Input" type="password" class="form-control" placeholder="Confirm new password" />
    <button class="btn-glow" onclick="resetPassword()">Reset Password</button>
  </div>

  <div id="msgBox" class="msg-box"></div>
  <a href="{{ url_for('login') }}" class="small-link">← Back to Login</a>
</div>

<script>
  let verifiedEmail = "";
  let verifiedOtp   = "";

  function showMsg(text, type) {
    const box = document.getElementById("msgBox");
    box.textContent = text;
    box.className   = `msg-box msg-${type}`;
    box.style.display = "block";
  }

  async function sendOtp() {
    const email = document.getElementById("emailInput").value.trim();
    if (!email) { showMsg("Please enter your email.", "error"); return; }

    const btn = document.getElementById("sendOtpBtn");
    btn.disabled = true;
    btn.textContent = "Sending…";

    try {
      const res  = await fetch("/generate_otp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email }),
      });
      const data = await res.json();

      if (!res.ok) {
        showMsg(data.error || "Failed to send OTP.", "error");
        btn.disabled = false;
        btn.textContent = "Send OTP";
        return;
      }

      verifiedEmail = email;
      document.getElementById("emailDisplay").textContent = email;
      document.getElementById("stepEmail").style.display = "none";
      document.getElementById("stepOtp").style.display   = "block";
      showMsg("OTP sent! Check your inbox.", "success");

    } catch {
      showMsg("Network error. Try again.", "error");
      btn.disabled = false;
      btn.textContent = "Send OTP";
    }
  }

  function verifyStep() {
    // Just capture OTP locally and move to password step —
    // actual verification happens server-side on submit.
    const otp = document.getElementById("otpInput").value.trim();
    if (otp.length !== 6 || isNaN(otp)) {
      showMsg("Please enter the 6-digit OTP.", "error");
      return;
    }
    verifiedOtp = otp;
    document.getElementById("stepOtp").style.display      = "none";
    document.getElementById("stepPassword").style.display = "block";
    showMsg("OTP captured. Set your new password.", "success");
  }

  async function resetPassword() {
    const password  = document.getElementById("passwordInput").value;
    const password2 = document.getElementById("password2Input").value;

    if (!password || !password2) { showMsg("Please fill in both password fields.", "error"); return; }
    if (password !== password2)  { showMsg("Passwords do not match.", "error"); return; }

    try {
      const res  = await fetch("/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: verifiedEmail, otp: verifiedOtp, password }),
      });
      const data = await res.json();

      if (!res.ok) {
        showMsg(data.error || "Reset failed.", "error");
        return;
      }

      showMsg(data.message, "success");
      document.getElementById("stepPassword").style.display = "none";
      setTimeout(() => window.location.href = "{{ url_for('login') }}", 2500);

    } catch {
      showMsg("Network error. Try again.", "error");
    }
  }
</script>
</body>
</html>
