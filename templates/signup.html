<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Wildfire Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0a0a0f, #1a1a2e, #16213e);
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
      color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 50px 40px;
      width: 380px;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
      text-align: center;
      transition: transform 0.4s ease;
      position: relative;
      margin: 40px auto;
    }

    .glass-card:hover {
      transform: scale(1.02);
    }

    h2 {
      font-weight: 600;
      margin-bottom: 20px;
      color: #fff;
    }

    .form-control {
      background: rgba(255, 255, 255, 0.15);
      border: none;
      color: #fff;
      border-radius: 12px;
      padding: 12px 15px;
      margin-bottom: 15px;
    }

    .form-control::placeholder {
      color: rgba(255,255,255,0.5);
    }

    .form-control:focus {
      background: rgba(255,255,255,0.25);
      box-shadow: 0 0 10px rgba(0,188,212,0.4);
      outline: none;
      color: #fff;
    }

    .btn-glow {
      width: 100%;
      background: linear-gradient(90deg, #00bcd4, #007bff);
      border: none;
      color: #fff;
      font-weight: 600;
      border-radius: 25px;
      padding: 12px 0;
      transition: all 0.3s ease;
    }

    .btn-glow:hover {
      box-shadow: 0 0 20px #00bcd4;
      transform: scale(1.03);
    }

    .small-link {
      display: block;
      margin-top: 15px;
      color: #bbb;
      text-decoration: none;
      transition: color 0.3s;
    }

    .small-link:hover {
      color: #00bcd4;
    }

    /* OTP button */
    .btn-otp {
      background: linear-gradient(135deg, #f80707, #e1771b, #a49937);
      color: #fff;
      height: 48px;
      width: 80px;
      border: none;
      padding: 0;
      border-radius: 0 12px 12px 0;
      font-size: 0.78rem;
      font-weight: 600;
      transition: background 0.3s ease, box-shadow 0.3s ease, opacity 0.3s ease;
      white-space: nowrap;
    }

    .btn-otp:hover:not(:disabled) {
      background: linear-gradient(135deg, #4bf807, #1be192, #12bbd9);
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }

    .btn-otp:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Make the input-group sit flush */
    .input-group .form-control {
      border-radius: 12px 0 0 12px;
      margin-bottom: 0;
    }

    .input-group {
      margin-bottom: 15px;
    }

    /* Password strength bar */
    #strengthBar {
      height: 4px;
      border-radius: 4px;
      width: 0%;
      transition: width 0.4s ease, background 0.4s ease;
      margin-bottom: 6px;
    }

    #strengthText {
      font-size: 13px;
      height: 18px;
      margin-bottom: 12px;
      text-align: left;
    }

    /* Alerts */
    .alert {
      font-size: 0.9rem;
      padding: 10px 14px;
      border-radius: 10px;
      margin-bottom: 15px;
      text-align: center;
    }

    .alert-success {
      background-color: rgba(25, 135, 84, 0.15);
      color: #4eff9d;
      border: 1px solid rgba(25, 135, 84, 0.3);
    }

    .alert-danger, .alert-error {
      background-color: rgba(220, 53, 69, 0.15);
      color: #ff5c5c;
      border: 1px solid rgba(220, 53, 69, 0.3);
    }

    .alert-warning {
      background-color: rgba(255, 193, 7, 0.15);
      color: #ffd060;
      border: 1px solid rgba(255, 193, 7, 0.3);
    }
  </style>
</head>
<body>
  <div class="glass-card">
    <h2>Create Account</h2>

    <!-- Server-side flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="/signup" method="POST" id="signupForm">
      <input type="text" name="fullname" class="form-control" placeholder="Full Name" required>

      <!-- Email + OTP button -->
      <div class="input-group">
        <input type="email" id="email" name="email" class="form-control" placeholder="Email" required>
        <button type="button" class="btn-otp" id="otpBtn">Get OTP</button>
      </div>

      <input type="text" id="otp" name="otp" class="form-control" placeholder="Enter OTP" required>
      <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>

      <!-- Strength bar + label -->
      <div id="strengthBar"></div>
      <div id="strengthText"></div>

      <button type="submit" class="btn-glow">Sign Up</button>
    </form>

    <a href="{{ url_for('login') }}" class="small-link">Already have an account? Login</a>
    <a href="{{ url_for('index') }}" class="small-link">← Back to Home</a>
  </div>

  <script>
    // -------------------------------------------------------
    //  Password strength — matches backend rules exactly:
    //  min 8 chars, uppercase, lowercase, digit, symbol (@$!%*?&)
    // -------------------------------------------------------
    const passwordInput  = document.getElementById("password");
    const strengthBar    = document.getElementById("strengthBar");
    const strengthText   = document.getElementById("strengthText");

    function checkStrength(val) {
      const hasUpper  = /[A-Z]/.test(val);
      const hasLower  = /[a-z]/.test(val);
      const hasDigit  = /\d/.test(val);
      const hasSymbol = /[@$!%*?&]/.test(val);
      const hasLength = val.length >= 8;

      const score = [hasUpper, hasLower, hasDigit, hasSymbol, hasLength]
                      .filter(Boolean).length;

      if (val.length === 0) {
        strengthBar.style.width = "0%";
        strengthText.textContent = "";
        return;
      }

      if (score <= 2) {
        strengthBar.style.width = "33%";
        strengthBar.style.background = "#ff4444";
        strengthText.style.color = "#ff4444";
        strengthText.textContent = "Weak — add uppercase, symbol & digit";
      } else if (score === 3 || score === 4) {
        strengthBar.style.width = "66%";
        strengthBar.style.background = "#ffa500";
        strengthText.style.color = "#ffa500";
        strengthText.textContent = "Medium — almost there";
      } else {
        strengthBar.style.width = "100%";
        strengthBar.style.background = "#4eff9d";
        strengthText.style.color = "#4eff9d";
        strengthText.textContent = "Strong ✓";
      }
    }

    passwordInput.addEventListener("input", () => checkStrength(passwordInput.value));

    // -------------------------------------------------------
    //  OTP button — sends request, shows message only (no OTP),
    //  then starts a 30-second cooldown
    // -------------------------------------------------------
    const otpBtn = document.getElementById("otpBtn");
    let cooldownTimer = null;

    otpBtn.addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      if (!email) {
        showFlash("Please enter your email first.", "danger");
        return;
      }

      // Disable immediately to prevent double-clicks
      otpBtn.disabled = true;

      try {
        const res  = await fetch("/generate_otp", {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ email })
        });

        const data = await res.json();

        if (res.ok && data.message) {
          // ✅ Backend no longer returns the OTP — just show the message
          showFlash(data.message, "success");
          startCooldown(30);
        } else {
          showFlash(data.error || "Failed to send OTP.", "danger");
          otpBtn.disabled = false;  // re-enable on error
        }

      } catch (err) {
        showFlash("Server error while sending OTP.", "danger");
        otpBtn.disabled = false;
      }
    });

    function startCooldown(seconds) {
      let remaining = seconds;
      otpBtn.textContent = `${remaining}s`;

      cooldownTimer = setInterval(() => {
        remaining--;
        otpBtn.textContent = `${remaining}s`;
        if (remaining <= 0) {
          clearInterval(cooldownTimer);
          otpBtn.disabled = false;
          otpBtn.textContent = "Get OTP";
        }
      }, 1000);
    }

    // -------------------------------------------------------
    //  Form validation before submit — mirrors backend exactly
    // -------------------------------------------------------
    document.getElementById("signupForm").addEventListener("submit", (e) => {
      const val       = passwordInput.value;
      const otp       = document.getElementById("otp").value.trim();

      const hasUpper  = /[A-Z]/.test(val);
      const hasLower  = /[a-z]/.test(val);
      const hasDigit  = /\d/.test(val);
      const hasSymbol = /[@$!%*?&]/.test(val);
      const hasLength = val.length >= 8;

      if (!(hasUpper && hasLower && hasDigit && hasSymbol && hasLength)) {
        e.preventDefault();
        showFlash("Password must be 8+ chars with uppercase, lowercase, digit, and a symbol (@$!%*?&).", "danger");
        return;
      }

      if (!otp || otp.length < 6) {
        e.preventDefault();
        showFlash("Please enter the 6-digit OTP sent to your email.", "danger");
      }
    });

    // -------------------------------------------------------
    //  Utility: inject a dismissible flash alert into the card
    // -------------------------------------------------------
    function showFlash(message, category = "success") {
      const existing = document.querySelectorAll(".dynamic-alert");
      existing.forEach(el => el.remove());

      const alert = document.createElement("div");
      alert.className = `alert alert-${category} alert-dismissible fade show dynamic-alert`;
      alert.innerHTML = `
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      `;

      const card = document.querySelector(".glass-card");
      card.insertBefore(alert, card.children[1]);

      setTimeout(() => alert.classList.remove("show"), 4000);
      setTimeout(() => alert.remove(), 4500);
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
