<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Wildfire Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0a0a0f, #1a1a2e, #16213e);
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
      color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 50px 40px;
      width: 360px;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
      text-align: center;
      transition: transform 0.4s ease;
    }
    .glass-card:hover {
      transform: scale(1.02);
    }
    h2 {
      font-weight: 600;
      margin-bottom: 30px;
      color: #fff;
    }
    .form-control {
      background: rgba(255, 255, 255, 0.15);
      border: none;
      color: #fff;
      border-radius: 12px;
      padding: 12px 15px;
      margin-bottom: 15px;
    }
    .form-control:focus {
      background: rgba(255,255,255,0.25);
      box-shadow: 0 0 10px rgba(0,188,212,0.4);
      outline: none;
    }
    .btn-glow {
      width: 100%;
      background: linear-gradient(90deg, #00bcd4, #007bff);
      border: none;
      color: #fff;
      font-weight: 600;
      border-radius: 25px;
      padding: 12px 0;
      transition: all 0.3s ease;
    }
    .btn-glow:hover {
      box-shadow: 0 0 20px #00bcd4;
      transform: scale(1.03);
    }
    .small-link {
      display: block;
      margin-top: 15px;
      color: #bbb;
      text-decoration: none;
      transition: color 0.3s;
    }
    .small-link:hover {
      color: #00bcd4;
    }
  </style>
</head>
<body>
  <div class="glass-card">
    <h2>Welcome Back</h2>
    <form action="{{ url_for('login') }}" method="POST">
      <input type="email" name="email" class="form-control" placeholder="Email" required>
      <input type="password" name="password" class="form-control" placeholder="Password" required>
      <button type="submit" class="btn-glow">Login</button>
    </form>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, msg in messages %}
          <div class="alert alert-{{ category }} mt-3">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <a href="{{ url_for('signup') }}" class="small-link">Don’t have an account? Sign up</a>
    <a href="{{ url_for('index') }}" class="small-link">← Back to Home</a>
  </div>
</body>
</html>
