<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wildfire Prediction Portal</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0a0a0f, #1a1a2e, #16213e);
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
      color: #f0f0f0;
      overflow-x: hidden;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }

    .glass-box {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      padding: 60px 50px;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.4);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .glass-box:hover {
      transform: scale(1.03);
      box-shadow: 0 0 50px rgba(255, 255, 255, 0.15);
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 15px;
      letter-spacing: 1px;
    }

    p {
      font-size: 1.1rem;
      color: #d1d1d1;
      margin-bottom: 40px;
    }

    .btn-neon {
      display: inline-block;
      padding: 12px 40px;
      border-radius: 30px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #fff;
      text-decoration: none;
      border: 2px solid transparent;
      background: linear-gradient(90deg, #00bcd4, #007bff);
      transition: all 0.4s ease;
      margin: 10px;
    }

    .btn-neon:hover {
      background: linear-gradient(90deg, #007bff, #00bcd4);
      box-shadow: 0 0 25px #00bcd4;
      transform: scale(1.05);
    }

    .btn-icon {
      width: 24px;   
      height: 24px;  
      vertical-align: middle;
      margin-right: 8px; 
    }

    footer {
      position: absolute;
      bottom: 10px;
      text-align: center;
      width: 100%;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
    }
  </style>
</head>

<body>
  <section class="hero">
    <div class="glass-box">
      <h1>Wildfire Prediction Portal</h1>
      <p>AI-powered detection and risk analysis using live atmospheric data</p>
      <div>
        <a href="{{ url_for('login') }}" class="btn-neon">
          <img src="{{ url_for('static', filename='images/undraw_login_weas_2.svg') }}" alt="" class="btn-icon">
          <span>Login</span>
        </a>
        
        <a href="{{ url_for('signup') }}" class="btn-neon">
          <img src="{{ url_for('static', filename='images/undraw_sign-here_lxua.svg') }}" alt="" class="btn-icon">
          <span>Sign Up</span>
        </a>
      </div>
    </div>
  </section>

</body>
</html>
